<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vinregistret">
<meta name="theme-color" content="#070404">
<title>Vinregistret</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8a96e;
    --gold-dim: rgba(200,169,110,0.15);
    --red: #8b3a3a;
    --red-dim: rgba(139,58,58,0.15);
    --bg: #070404;
    --surface: rgba(255,255,255,0.035);
    --border: rgba(255,255,255,0.08);
    --text: #f0e6d3;
    --text-muted: #8a7a6a;
    --text-dim: #5a4a3a;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(120,40,20,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(80,30,10,0.1) 0%, transparent 50%);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(7,4,4,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(200,169,110,0.12);
    padding: calc(var(--safe-top) + 16px) 20px 16px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .add-btn {
    background: linear-gradient(135deg, var(--gold), #a07840);
    border: none;
    border-radius: 50px;
    color: #0f0808;
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 700;
    padding: 8px 20px;
    cursor: pointer;
    white-space: nowrap;
    -webkit-appearance: none;
  }

  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 14px;
    text-align: center;
    flex: 1;
  }

  .stat-num { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }

  .controls {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .controls::-webkit-scrollbar { display: none; }

  .search-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text);
    font-family: var(--serif);
    font-size: 15px;
    outline: none;
    flex: 1;
    min-width: 0;
    -webkit-appearance: none;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: var(--serif);
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
    -webkit-appearance: none;
    transition: all 0.2s;
  }

  .filter-btn.active-all { border-color: rgba(200,169,110,0.4); color: var(--gold); background: var(--gold-dim); }
  .filter-btn.active-buy { border-color: rgba(200,169,110,0.4); color: var(--gold); background: var(--gold-dim); }
  .filter-btn.active-avoid { border-color: rgba(139,58,58,0.4); color: var(--red); background: var(--red-dim); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    padding: 20px 16px calc(var(--safe-bottom) + 20px);
    max-width: 800px;
    margin: 0 auto;
  }

  @media (min-width: 500px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.2s;
    cursor: pointer;
  }

  .card:active { transform: scale(0.97); }

  .card-photo {
    height: 180px;
    background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .card-photo-placeholder { font-size: 40px; opacity: 0.3; position: relative; z-index: 1; }

  .badge {
    position: absolute;
    top: 8px;
    right: 8px;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 2;
  }

  .badge-buy { background: rgba(200,169,110,0.2); border: 1px solid var(--gold); color: var(--gold); }
  .badge-avoid { background: rgba(139,58,58,0.2); border: 1px solid var(--red); color: var(--red); }

  .card-body { padding: 12px; }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .card-producer {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 6px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 8px;
  }

  .tag-year { color: var(--gold); background: rgba(200,169,110,0.1); }
  .tag-region { color: #9a8a7a; background: rgba(255,255,255,0.05); }
  .tag-price { color: #9a9a9a; background: rgba(255,255,255,0.05); }

  .stars { font-size: 13px; margin-bottom: 6px; }
  .star-on { color: var(--gold); }
  .star-off { color: rgba(255,255,255,0.1); }

  .card-notes {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 60px; margin-bottom: 16px; }
  .empty-text { font-size: 18px; font-style: italic; }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  @media (min-height: 700px) and (min-width: 500px) {
    .overlay { align-items: center; }
  }

  /* FORM SHEET */
  .sheet {
    background: #0f0808;
    border: 1px solid rgba(200,169,110,0.2);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(var(--safe-bottom) + 24px);
    width: 100%;
    max-width: 560px;
    max-height: 92vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  @media (min-width: 500px) and (min-height: 700px) {
    .sheet {
      border-radius: 20px;
      max-height: 90vh;
    }
  }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .sheet-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 20px;
  }

  /* PHOTO UPLOAD */
  .photo-upload {
    height: 150px;
    background: rgba(255,255,255,0.03);
    border: 2px dashed rgba(200,169,110,0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }

  .photo-upload:active { border-color: var(--gold); }

  .photo-upload img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-placeholder { text-align: center; color: var(--text-dim); position: relative; z-index: 1; }
  .photo-placeholder-icon { font-size: 28px; margin-bottom: 6px; }
  .photo-placeholder-text { font-size: 13px; }

  .wine-type-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 4px;
  }

  .type-btn {
    padding: 8px 4px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: var(--serif);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
    text-align: center;
  }

  .type-btn.active {
    border-color: rgba(200,169,110,0.5);
    color: var(--gold);
    background: var(--gold-dim);
  }

  /* STATUS TOGGLE */
  .status-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .status-btn {
    padding: 11px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
  }

  .status-btn.active-buy { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .status-btn.active-avoid { border-color: var(--red); color: var(--red); background: var(--red-dim); }

  /* FORM FIELDS */
  .field { margin-bottom: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

  .field-label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--serif);
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .field-input:focus { border-color: rgba(200,169,110,0.4); }

  textarea.field-input {
    min-height: 72px;
    resize: vertical;
    line-height: 1.5;
  }

  /* STARS INPUT */
  .stars-input { display: flex; gap: 10px; margin-top: 4px; }
  .star-btn {
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    transition: transform 0.1s;
    -webkit-appearance: none;
    line-height: 1;
  }
  .star-btn:active { transform: scale(1.3); }

  /* FORM ACTIONS */
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }

  .save-btn {
    flex: 1;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), #a07840);
    border: none;
    border-radius: 12px;
    color: #0f0808;
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    -webkit-appearance: none;
  }

  .cancel-btn {
    padding: 14px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-dim);
    font-family: var(--serif);
    font-size: 16px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .delete-btn {
    width: 100%;
    padding: 12px;
    background: rgba(139,58,58,0.08);
    border: 1px solid rgba(139,58,58,0.25);
    border-radius: 12px;
    color: var(--red);
    font-family: var(--serif);
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
    -webkit-appearance: none;
  }

  /* DETAIL VIEW */
  .detail-photo {
    height: 260px;
    background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    margin-bottom: 20px;
  }

  .detail-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
  .detail-name { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .detail-producer { font-size: 16px; color: var(--text-muted); font-style: italic; margin-bottom: 14px; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .detail-tag { font-size: 13px; padding: 4px 14px; border-radius: 12px; }
  .detail-stars { font-size: 22px; margin-bottom: 14px; }
  .detail-notes { font-size: 15px; color: var(--text-muted); line-height: 1.7; font-style: italic; margin-bottom: 20px; }
  .detail-actions { display: flex; gap: 10px; }
  .edit-btn {
    flex: 1; padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-muted);
    font-family: var(--serif);
    font-size: 15px;
    cursor: pointer;
    -webkit-appearance: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🍷 Vinregistret</h1>
    <button class="add-btn" onclick="openForm()">+ Lägg till</button>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total" style="color:#9a8a7a">0</div>
      <div class="stat-label">Totalt</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-buy" style="color:#c8a96e">0</div>
      <div class="stat-label">Köp igen</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-avoid" style="color:#8b3a3a">0</div>
      <div class="stat-label">Undvik</div>
    </div>
  </div>
  <div class="controls">
    <input class="search-input" id="search" placeholder="Sök..." oninput="renderGrid()" style="min-width:120px">
    <button class="filter-btn active-all" id="f-all" onclick="setFilter('all')">Alla</button>
    <button class="filter-btn" id="f-buy" onclick="setFilter('buy')">✦ Köp</button>
    <button class="filter-btn" id="f-avoid" onclick="setFilter('avoid')">✕ Undvik</button>
  </div>
</div>

<div id="grid-container"></div>

<!-- FORM OVERLAY -->
<div class="overlay" id="form-overlay" style="display:none" onclick="overlayClickForm(event)">
  <div class="sheet" id="form-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="form-title">Registrera vin</div>

    <div class="photo-upload" id="photo-upload-area" onclick="document.getElementById('photo-input').click()">
      <img id="photo-preview" src="" style="display:none">
      <div class="photo-placeholder" id="photo-placeholder">
        <div class="photo-placeholder-icon">📷</div>
        <div class="photo-placeholder-text">Tryck för att ta foto eller välj bild</div>
      </div>
    </div>
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">

    <div class="field">
      <label class="field-label">Typ av vin</label>
      <div class="wine-type-grid" id="wine-type-grid">
        <button class="type-btn" onclick="setWineType('rött')">🍷 Rött</button>
        <button class="type-btn" onclick="setWineType('vitt')">🥂 Vitt</button>
        <button class="type-btn" onclick="setWineType('rosé')">🌸 Rosé</button>
        <button class="type-btn" onclick="setWineType('prosecco')">🍾 Prosecco</button>
        <button class="type-btn" onclick="setWineType('champagne')">✨ Champagne</button>
        <button class="type-btn" onclick="setWineType('mousserande')">🫧 Mousserande</button>
        <button class="type-btn" onclick="setWineType('cava')">🥂 Cava</button>
        <button class="type-btn" onclick="setWineType('dessertvin')">🍯 Dessertvin</button>
        <button class="type-btn" onclick="setWineType('portvin')">🪴 Portvin</button>
      </div>
    </div>

    <div class="status-toggle">
      <button class="status-btn active-buy" id="btn-buy" onclick="setStatus('buy')">✦ Köp igen</button>
      <button class="status-btn" id="btn-avoid" onclick="setStatus('avoid')">✕ Undvik</button>
    </div>

    <div class="field">
      <label class="field-label">Vinnamn *</label>
      <input class="field-input" id="f-name" placeholder="ex. Barolo Riserva">
    </div>

    <div class="field-row">
      <div>
        <label class="field-label">Producent</label>
        <input class="field-input" id="f-producer" placeholder="ex. Antinori">
      </div>
      <div>
        <label class="field-label">Årgång</label>
        <input class="field-input" id="f-year" placeholder="ex. 2019" type="number">
      </div>
    </div>

    <div class="field-row">
      <div>
        <label class="field-label">Region</label>
        <input class="field-input" id="f-region" placeholder="ex. Piemonte">
      </div>
      <div>
        <label class="field-label">Pris (kr)</label>
        <input class="field-input" id="f-price" placeholder="ex. 249" type="number">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Betyg</label>
      <div class="stars-input" id="stars-input">
        <button class="star-btn" onclick="setRating(1)">★</button>
        <button class="star-btn" onclick="setRating(2)">★</button>
        <button class="star-btn" onclick="setRating(3)">★</button>
        <button class="star-btn" onclick="setRating(4)">★</button>
        <button class="star-btn" onclick="setRating(5)">★</button>
      </div>
    </div>

    <div class="field-row">
      <div>
        <label class="field-label">Druva</label>
        <input class="field-input" id="f-grape" placeholder="ex. Nebbiolo">
      </div>
      <div>
        <label class="field-label">Klassificering</label>
        <input class="field-input" id="f-classification" placeholder="ex. DOCG, AOP">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Anteckningar</label>
      <textarea class="field-input" id="f-notes" placeholder="Smakprofil, tillfälle, tankar..."></textarea>
    </div>

    <div class="form-actions">
      <button class="save-btn" onclick="saveWine()">Spara vin</button>
      <button class="cancel-btn" onclick="closeForm()">Avbryt</button>
    </div>
    <button class="delete-btn" id="delete-btn" style="display:none" onclick="deleteWine()">Ta bort detta vin</button>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay" style="display:none" onclick="overlayClickDetail(event)">
  <div class="sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="detail-photo" id="d-photo">
      <img id="d-photo-img" src="" style="display:none">
      <span id="d-photo-placeholder" style="font-size:48px;opacity:0.3">🍷</span>
    </div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px">
      <div class="detail-name" id="d-name"></div>
      <div class="badge" id="d-badge"></div>
    </div>
    <div class="detail-producer" id="d-producer"></div>
    <div class="detail-tags" id="d-tags"></div>
    <div class="detail-stars" id="d-stars"></div>
    <div class="detail-notes" id="d-notes"></div>
    <div class="detail-actions">
      <button class="edit-btn" onclick="editFromDetail()">✎ Redigera</button>
      <button class="cancel-btn" onclick="closeDetail()">Stäng</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'wine_registry_v2';
let wines = [];
let filter = 'all';
let editingId = null;
let currentRating = 3;
let currentStatus = 'buy';
let currentPhoto = null;
let currentWineType = '';
let detailId = null;

// Load
try { wines = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { wines = []; }

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(wines)); } catch {}
}

function setFilter(f) {
  filter = f;
  ['all','buy','avoid'].forEach(v => {
    const btn = document.getElementById('f-'+v);
    btn.className = 'filter-btn' + (v === f ? ' active-'+v : '');
  });
  renderGrid();
}

function renderGrid() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = wines.filter(w => {
    if (filter !== 'all' && w.status !== filter) return false;
    return !q || w.name.toLowerCase().includes(q)
      || (w.producer||'').toLowerCase().includes(q)
      || (w.region||'').toLowerCase().includes(q);
  });

  document.getElementById('stat-total').textContent = wines.length;
  document.getElementById('stat-buy').textContent = wines.filter(w=>w.status==='buy').length;
  document.getElementById('stat-avoid').textContent = wines.filter(w=>w.status==='avoid').length;

  const c = document.getElementById('grid-container');
  if (filtered.length === 0) {
    c.innerHTML = `<div class="empty">
      <div class="empty-icon">🍾</div>
      <div class="empty-text">${wines.length===0?'Inga viner ännu — lägg till ditt första!':'Inga viner matchar.'}</div>
    </div>`;
    return;
  }

  c.innerHTML = `<div class="grid">${filtered.map(w => cardHTML(w)).join('')}</div>`;
}

function cardHTML(w) {
  const stars = [1,2,3,4,5].map(s =>
    `<span class="${s<=w.rating?'star-on':'star-off'}">★</span>`).join('');
  const photoHTML = w.photo
    ? `<img src="${w.photo}" alt="">`
    : `<span class="card-photo-placeholder">🍷</span>`;
  const badgeClass = w.status==='buy'?'badge-buy':'badge-avoid';
  const badgeLabel = w.status==='buy'?'✦ Köp':'✕ Undvik';
  const tags = [
    w.wineType ? `<span class="tag" style="color:#c8a96e;background:rgba(200,169,110,0.1)">${w.wineType}</span>` : '',
    w.grape ? `<span class="tag" style="color:#b08060;background:rgba(176,128,96,0.1)">${w.grape}</span>` : '',
    w.classification ? `<span class="tag" style="color:#9a8a7a;background:rgba(255,255,255,0.05)">${w.classification}</span>` : '',
    w.year ? `<span class="tag tag-year">${w.year}</span>` : '',
    w.region ? `<span class="tag tag-region">${w.region}</span>` : '',
    w.price ? `<span class="tag tag-price">${w.price} kr</span>` : '',
  ].join('');

  return `<div class="card" onclick="openDetail(${w.id})">
    <div class="card-photo">
      ${photoHTML}
      <div class="badge ${badgeClass}">${badgeLabel}</div>
    </div>
    <div class="card-body">
      <div class="card-name">${esc(w.name)}</div>
      ${w.producer ? `<div class="card-producer">${esc(w.producer)}</div>` : ''}
      <div class="card-tags">${tags}</div>
      <div class="stars">${stars}</div>
      ${w.notes ? `<div class="card-notes">${esc(w.notes)}</div>` : ''}
    </div>
  </div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// FORM
function openForm(id) {
  editingId = id || null;
  const w = id ? wines.find(x => x.id === id) : null;

  document.getElementById('form-title').textContent = w ? 'Redigera vin' : 'Registrera vin';
  document.getElementById('f-name').value = w?.name || '';
  document.getElementById('f-producer').value = w?.producer || '';
  document.getElementById('f-year').value = w?.year || '';
  document.getElementById('f-region').value = w?.region || '';
  document.getElementById('f-price').value = w?.price || '';
  document.getElementById('f-grape').value = w?.grape || '';
  document.getElementById('f-classification').value = w?.classification || '';
  document.getElementById('f-notes').value = w?.notes || '';
  document.getElementById('delete-btn').style.display = w ? 'block' : 'none';

  currentRating = w?.rating || 3;
  currentStatus = w?.status || 'buy';
  currentPhoto = w?.photo || null;
  currentWineType = w?.wineType || '';

  setStatus(currentStatus);
  setRating(currentRating);
  // reset type buttons then activate
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  if (currentWineType) setWineType(currentWineType);

  const img = document.getElementById('photo-preview');
  const ph = document.getElementById('photo-placeholder');
  if (currentPhoto) { img.src = currentPhoto; img.style.display='block'; ph.style.display='none'; }
  else { img.style.display='none'; ph.style.display='block'; }

  document.getElementById('photo-input').value = '';
  document.getElementById('form-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}

function closeForm() {
  document.getElementById('form-overlay').style.display = 'none';
}

function overlayClickForm(e) {
  if (e.target.id === 'form-overlay') closeForm();
}

function setWineType(t) {
  currentWineType = t;
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().includes(t));
  });
}

function setStatus(s) {
  currentStatus = s;
  document.getElementById('btn-buy').className = 'status-btn' + (s==='buy'?' active-buy':'');
  document.getElementById('btn-avoid').className = 'status-btn' + (s==='avoid'?' active-avoid':'');
}

function setRating(r) {
  currentRating = r;
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.style.color = i < r ? '#c8a96e' : 'rgba(255,255,255,0.15)';
  });
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentPhoto = ev.target.result;
    const img = document.getElementById('photo-preview');
    img.src = currentPhoto;
    img.style.display = 'block';
    document.getElementById('photo-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function saveWine() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Ange ett vinnamn'); return; }
  const wine = {
    id: editingId || Date.now(),
    name,
    producer: document.getElementById('f-producer').value.trim(),
    year: document.getElementById('f-year').value.trim(),
    region: document.getElementById('f-region').value.trim(),
    price: document.getElementById('f-price').value.trim(),
    grape: document.getElementById('f-grape').value.trim(),
    classification: document.getElementById('f-classification').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    rating: currentRating,
    status: currentStatus,
    photo: currentPhoto,
    wineType: currentWineType,
  };
  if (editingId) {
    wines = wines.map(w => w.id === editingId ? wine : w);
  } else {
    wines.unshift(wine);
  }
  save();
  closeForm();
  renderGrid();
}

function deleteWine() {
  if (!confirm('Ta bort detta vin?')) return;
  wines = wines.filter(w => w.id !== editingId);
  save();
  closeForm();
  renderGrid();
}

// DETAIL
function openDetail(id) {
  detailId = id;
  const w = wines.find(x => x.id === id);
  if (!w) return;

  const img = document.getElementById('d-photo-img');
  const ph = document.getElementById('d-photo-placeholder');
  if (w.photo) { img.src = w.photo; img.style.display='block'; ph.style.display='none'; }
  else { img.style.display='none'; ph.style.display='block'; }

  document.getElementById('d-name').textContent = w.name;
  const badge = document.getElementById('d-badge');
  badge.textContent = w.status==='buy' ? '✦ Köp igen' : '✕ Undvik';
  badge.className = 'badge ' + (w.status==='buy'?'badge-buy':'badge-avoid');
  document.getElementById('d-producer').textContent = w.producer || '';
  document.getElementById('d-producer').style.display = w.producer ? 'block' : 'none';

  const tags = [
    w.wineType ? `<span class="detail-tag" style="color:#c8a96e;background:rgba(200,169,110,0.1)">${w.wineType}</span>` : '',
    w.grape ? `<span class="detail-tag" style="color:#b08060;background:rgba(176,128,96,0.1)">${w.grape}</span>` : '',
    w.classification ? `<span class="detail-tag" style="color:#9a8a7a;background:rgba(255,255,255,0.05)">${w.classification}</span>` : '',
    w.year ? `<span class="detail-tag tag-year">${w.year}</span>` : '',
    w.region ? `<span class="detail-tag tag-region">${w.region}</span>` : '',
    w.price ? `<span class="detail-tag tag-price">${w.price} kr</span>` : '',
  ].join('');
  document.getElementById('d-tags').innerHTML = tags;

  document.getElementById('d-stars').innerHTML =
    [1,2,3,4,5].map(s=>`<span class="${s<=w.rating?'star-on':'star-off'}">★</span>`).join('');

  const notesEl = document.getElementById('d-notes');
  if (w.notes) { notesEl.textContent = `"${w.notes}"`; notesEl.style.display='block'; }
  else { notesEl.style.display='none'; }

  document.getElementById('detail-overlay').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('detail-overlay').style.display = 'none';
}

function overlayClickDetail(e) {
  if (e.target.id === 'detail-overlay') closeDetail();
}

function editFromDetail() {
  closeDetail();
  openForm(detailId);
}

// Init
renderGrid();
</script>
</body>
</html>
